<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <meta name="supported-color-schemes" content="light only" />
  <title>{{titulo}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    :root {
      color-scheme: light only;
      supported-color-schemes: light only;
    }
    body, table, td, p, h1, span, a {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    img {
      border: 0;
      outline: none;
      text-decoration: none;
      -ms-interpolation-mode: bicubic;
    }
    @media (prefers-color-scheme: dark) {
      .email-outer, .email-outer td { background-color: #f4f5f8 !important; }
      .email-card, .email-card td, .email-logo, .email-logo td { background-color: #ffffff !important; }
      .email-content, .email-content td { background-color: #ffffff !important; }
      .email-code-wrap, .email-code-wrap td { background-color: #f7f9fc !important; }
      .email-footer, .email-footer td { background-color: #ffffff !important; }
      .text-muted { color: #5f6b82 !important; }
      .text-body { color: #3a4a6b !important; }
      .text-title { color: #0D1B3E !important; }
      .text-code-label { color: #8a96ad !important; }
      .text-code { color: #0D1B3E !important; }
      .text-note { color: #6b7a99 !important; }
      .text-brand { color: #C41E3A !important; }
      .text-footer { color: #8a96ad !important; }
      .bar-red { background-color: #C41E3A !important; }
      .logo-bg { background-color: #ffffff !important; }
    }
    [data-ogsc] .text-title, [data-ogsb] .text-title { color: #0D1B3E !important; }
    [data-ogsc] .text-code, [data-ogsb] .text-code { color: #0D1B3E !important; }
    [data-ogsc] .email-card, [data-ogsb] .email-card { background-color: #ffffff !important; }
  </style>
</head>
<body class="email-body" style="margin:0;padding:0;background-color:#f4f5f8 !important;color:#1e2d4e !important;font-family:Arial,Helvetica,sans-serif;color-scheme:light only;">
  <table role="presentation" class="email-outer" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f4f5f8" style="background-color:#f4f5f8 !important;">
    <tr>
      <td align="center" bgcolor="#f4f5f8" style="background-color:#f4f5f8 !important;padding:32px 16px;">
        <table role="presentation" class="email-card" width="560" cellpadding="0" cellspacing="0" border="0" bgcolor="#ffffff" style="width:100%;max-width:560px;background-color:#ffffff !important;border:1px solid #e6eaf2;">
          <tr>
            <td class="email-logo logo-bg" align="center" bgcolor="#ffffff" style="background-color:#ffffff !important;padding:28px 20px 16px;">
              <!--[if mso]>
              <table role="presentation" width="200" cellpadding="0" cellspacing="0" border="0" bgcolor="#ffffff"><tr><td align="center" bgcolor="#ffffff">
              <![endif]-->
              <img src="https://i.ibb.co/gbQgcRq3/Captura-de-pantalla-2026-06-15-011218.webp" alt="Café UNA" width="200" style="display:block;width:200px;max-width:200px;height:auto;border:0;margin:0 auto;background-color:#ffffff;" />
              <!--[if mso]>
              </td></tr></table>
              <![endif]-->
            </td>
          </tr>
          <tr>
            <td class="bar-red" bgcolor="#C41E3A" style="background-color:#C41E3A !important;height:4px;font-size:0;line-height:0;">&nbsp;</td>
          </tr>
          <tr>
            <td class="email-content" bgcolor="#ffffff" style="background-color:#ffffff !important;padding:32px 28px 8px;">
              <p class="text-muted" style="margin:0 0 8px;font-size:15px;line-height:1.6;color:#5f6b82 !important;">{{saludo}}</p>
              <h1 class="text-title" style="margin:0 0 12px;font-size:24px;line-height:1.35;color:#0D1B3E !important;font-weight:700;">{{titulo}}</h1>
              <p class="text-body" style="margin:0;font-size:15px;line-height:1.7;color:#3a4a6b !important;">{{mensaje}}</p>
            </td>
          </tr>
          <tr>
            <td class="email-content" align="center" bgcolor="#ffffff" style="background-color:#ffffff !important;padding:24px 28px 8px;">
              <table role="presentation" class="email-code-wrap" cellpadding="0" cellspacing="0" border="0" bgcolor="#f7f9fc" style="background-color:#f7f9fc !important;border:1px solid #dfe6f0;">
                <tr>
                  <td align="center" bgcolor="#f7f9fc" style="background-color:#f7f9fc !important;padding:20px 32px;">
                    <p class="text-code-label" style="margin:0 0 10px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#8a96ad !important;">Tu código</p>
                    <p class="text-code" style="margin:0;font-size:32px;font-weight:700;letter-spacing:7px;color:#0D1B3E !important;font-family:Consolas,'Courier New',monospace;">{{codigo}}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td class="email-content" bgcolor="#ffffff" style="background-color:#ffffff !important;padding:16px 28px 28px;">
              <p class="text-note" style="margin:0;font-size:13px;line-height:1.7;color:#6b7a99 !important;">{{nota}}</p>
            </td>
          </tr>
          <tr>
            <td class="email-content" bgcolor="#ffffff" style="background-color:#ffffff !important;padding:0 28px 24px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#ffffff" style="background-color:#ffffff !important;">
                <tr>
                  <td bgcolor="#ffffff" style="background-color:#ffffff !important;border-top:1px solid #e8edf5;font-size:0;line-height:0;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td class="email-footer" align="center" bgcolor="#ffffff" style="background-color:#ffffff !important;padding:0 28px 28px;">
              <p class="text-brand" style="margin:0 0 4px;font-size:12px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:#C41E3A !important;">Café UNA</p>
              <p class="text-footer" style="margin:0;font-size:12px;line-height:1.6;color:#8a96ad !important;">Universidad Nacional, Costa Rica</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
