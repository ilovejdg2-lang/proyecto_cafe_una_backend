name: Deploy to Monster ASP

on:
  push:
    branches:
      - main
      - master
      - development
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    env:
      CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
      SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
      CEDULA_API_KEY: ${{ secrets.CEDULA_API_KEY }}
      SITE_URL: ${{ secrets.SITE_URL }}
      WEBSITE_NAME: ${{ secrets.WEBSITE_NAME }}
      SERVER_COMPUTER_NAME: ${{ secrets.SERVER_COMPUTER_NAME }}
      SERVER_USERNAME: ${{ secrets.SERVER_USERNAME }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Verify GitHub Secrets
        shell: pwsh
        run: ./scripts/verify-deploy-secrets.ps1

      - name: Install Web Deploy
        shell: pwsh
        run: |
          choco install webdeploy -y --no-progress
          if (-not (Test-Path "${env:ProgramFiles}\IIS\Microsoft Web Deploy V3\msdeploy.exe")) {
            throw 'msdeploy.exe no se instalo correctamente'
          }

      - name: Package for Monster ASP
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP 'cafeuna-publish'
          & ./scripts/package-for-monster.ps1 -PublishDir $publishDir | Out-Null
          echo "PUBLISH_DIR=$publishDir" >> $env:GITHUB_ENV

      - name: Deploy with MSDeploy
        shell: pwsh
        run: |
          & ./scripts/deploy-msdeploy.ps1 `
            -PublishDir $env:PUBLISH_DIR `
            -WebsiteName $env:WEBSITE_NAME `
            -ServerComputerName $env:SERVER_COMPUTER_NAME `
            -ServerUsername $env:SERVER_USERNAME `
            -ServerPassword $env:SERVER_PASSWORD

      - name: Smoke test
        shell: pwsh
        run: |
          Start-Sleep -Seconds 15
          $baseUrl = $env:SITE_URL.Trim().TrimEnd('/')
          if ($baseUrl -notmatch '^https?://') {
            $baseUrl = "http://$baseUrl"
          }

          $maxRetries = 6
          $apiOk = $false
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $api = Invoke-WebRequest -Uri "$baseUrl/api/informacion/hero" -UseBasicParsing -TimeoutSec 60
              if ($api.StatusCode -eq 200) {
                $apiOk = $true
                Write-Host "API hero OK en intento $i"
                break
              }
            } catch {
              Write-Host "API hero intento $i fallo: $($_.Exception.Message)"
            }
            if ($i -lt $maxRetries) { Start-Sleep -Seconds 10 }
          }
          if (-not $apiOk) {
            throw "API no respondio tras $maxRetries intentos en $baseUrl/api/informacion/hero"
          }

          $productosOk = $false
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              $api = Invoke-WebRequest -Uri "$baseUrl/api/productos" -UseBasicParsing -TimeoutSec 60
              if ($api.StatusCode -eq 200) {
                $productosOk = $true
                Write-Host "API productos OK en intento $i"
                break
              }
            } catch {
              Write-Host "API productos intento $i fallo: $($_.Exception.Message)"
            }
            if ($i -lt $maxRetries) { Start-Sleep -Seconds 10 }
          }
          if (-not $productosOk) {
            throw "API productos no respondio tras $maxRetries intentos en $baseUrl/api/productos"
          }
